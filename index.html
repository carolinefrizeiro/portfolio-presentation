<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Define o fundo preto/escuro para preencher as sobras laterais ou superiores */
        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000000; /* Altere para a cor de fundo desejada */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container que força a proporção de apresentação 16:9 e centraliza na tela */
        .presentation-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* Proporção 16:9 exata */
            max-height: 100vh;
            max-width: 177.78vh; /* Mantém a proporção sem vazar na altura */
        }

        /* Garante que o iframe e os elementos do Canva preencham o container */
        .presentation-container iframe,
        .presentation-container div { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
