<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caroline Frizeiro | Portfólio</title>
    <style>
        /* Remove todas as margens e bordas padrão do navegador */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
        }

        /* Container que esconde a barra inferior do Canva */
        .wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% + 40px);
            overflow: hidden;
        }

        /* Força o iframe do Canva a ocupar a tela inteira sem bordas */
        iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="wrapper">

 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">

    src="https://www.canva.com/design/DAG6ajB9cqM/xWFxQ2uXLiNWvy9KQ7T4eg/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>

</html>
