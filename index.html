<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Caroline Frizeiro</title>
    <style>
        /* Zera todas as margens e bordas padrão do navegador */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* Garante que o fundo e o corpo ocupem 100% da tela */
        html, body { 
            height: 100% !important; 
            width: 100% !important;
            overflow: hidden !important;
            background-color: #ffffff; /* Mude para #000000 se o fundo da apresentação for escuro */
        }

        /* Ocupa a tela cheia mantendo o iframe responsivo */
        .full-screen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
        }

        /* Força o iframe da apresentação a preencher 100% sem bordas arredondadas ou margens */
        .full-screen-container iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            display: block !important;
            border-radius: 0 !important;
        }
    </style>
</head>
<body>

    <div class="full-screen-container">
        <iframe loading="lazy" 
            src="https://www.canva.com/design/DAG6ajB9cqM/xWFxQ2uXLiNWvy9KQ7T4eg/view?embed" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
